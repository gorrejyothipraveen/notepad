<!DOCTYPE html>
<html lang="en">

<head>
  <title>note</title>
</head>

<body>
  <main>
    <form action="<%= `/edit_note/${it.noteId}` %>" method="post">
      <section>
        <label for="note">Note : </label>
        <textarea name="newNote" id="note" cols="100" rows="50"><%= it.note %></textarea>
      </section>
      <button type="submit">save</button>
    </form>
  </main>
</body>

</html>
